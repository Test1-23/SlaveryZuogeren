<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot 仪表盘</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h1>Bot 控制面板</h1>
    <div class="nav-links">
      <a href="/" class="active">仪表盘</a>
      <a href="config.html">配置管理</a>
      <a href="#" onclick="showSettings();return false">设置</a>
    </div>
  </nav>

  <main>
    <!-- 快速启动 -->
    <section class="quickstart">
      <div class="qs-header">
        <h2>快速启动</h2>
        <button class="btn-sm" onclick="loadConfigList()">刷新</button>
      </div>
      <div class="qs-grid" id="quickStartList">
        <span class="empty">加载中...</span>
      </div>
    </section>

    <!-- 快速新建 / 编辑 -->
    <section class="editor compact hidden" id="quickEditor">
      <h3 id="qeTitle">快速新建机器人</h3>
      <input type="hidden" id="qeEditId">
      <div class="form-inline">
        <input type="text" id="qeName" placeholder="备注名" class="inp">
        <input type="text" id="qeHost" value="localhost" placeholder="IP" class="inp">
        <input type="number" id="qePort" value="25565" placeholder="端口" class="inp inp-sm">
        <input type="text" id="qeVersion" value="" placeholder="版本 (留空=自动)" class="inp inp-sm">
        <select id="qeAuth" class="inp inp-sm"><option value="offline">离线</option><option value="microsoft">正版</option></select>
        <input type="text" id="qeUsername" value="Bot" placeholder="用户名" class="inp">
      </div>
      <div class="form-inline" style="margin-top:8px">
        <div class="module-pick" id="qeModules">
          <button type="button" class="module-pick-btn" onclick="toggleModulePick('qeModules')">选择模块 ▾</button>
          <div class="module-pick-drop" id="qeModulesDrop"></div>
        </div>
        <button class="btn-primary" id="qeSaveStartBtn" onclick="quickCreateAndStart()">创建并启动</button>
        <button class="btn-ghost" id="qeSaveBtn" onclick="quickSaveOnly()">仅保存</button>
        <button class="btn-ghost" onclick="cancelEdit()">取消</button>
      </div>
    </section>

    <!-- 运行中的 Bot -->
    <section>
      <div class="toolbar">
        <span id="status">状态: 连接中...</span>
        <span id="botCount">运行中: 0</span>
      </div>
      <table id="botTable">
        <thead>
          <tr>
            <th>备注名</th><th>用户名</th><th>服务器</th><th>状态</th><th>生命</th><th>饥饿</th>
            <th>坐标</th><th>维度</th><th>运行</th><th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="10" class="empty">没有运行中的机器人</td></tr>
        </tbody>
      </table>
    </section>

    <!-- 聊天面板 -->
    <section id="chatPanel" class="chat-panel hidden">
      <div class="chat-header">
        <h3>服务器消息</h3>
        <select id="chatBotSelect" class="inp inp-sm" onchange="switchChatBot()"></select>
        <button class="btn-sm" onclick="clearChat()">清屏</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <span class="empty">暂无消息</span>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" class="inp" placeholder="输入消息，回车发送..." onkeydown="if(event.key==='Enter')sendChat()" autofocus>
        <button class="btn-primary" onclick="sendChat()">发送</button>
      </div>
    </section>
  </main>

  <!-- 模块热插拔弹窗 -->
  <div id="moduleSwapOverlay" class="overlay hidden" onclick="if(event.target===this)hideModuleSwap()">
    <div class="settings-modal" style="width:480px">
      <h3 id="modSwapTitle">模块管理</h3>
      <div id="modSwapLoaded" style="margin-bottom:14px"></div>
      <div id="modSwapAvailable"></div>
      <div class="editor-actions" style="margin-top:14px">
        <button onclick="hideModuleSwap()">关闭</button>
      </div>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div id="settingsOverlay" class="overlay hidden" onclick="if(event.target===this)hideSettings()">
    <div class="settings-modal">
      <h3>系统设置</h3>
      <label>DeepSeek API Key
        <input type="password" id="setApiKey" class="inp" placeholder="sk-..." style="width:100%">
      </label>
      <label style="margin-top:8px">Model
        <input type="text" id="setModel" class="inp" value="deepseek-v4-flash" style="width:100%">
      </label>
      <div class="editor-actions" style="margin-top:14px">
        <button class="btn-primary" onclick="saveSettings()">保存</button>
        <button onclick="hideSettings()">取消</button>
      </div>
    </div>
  </div>

  <!-- AI 面板 -->
  <section id="aiPanel" class="chat-panel hidden" style="margin-top:24px">
    <div class="chat-header">
      <h3>AI 控制台</h3>
      <span id="aiStatusBadge" class="badge badge-stopped">未加载</span>
      <select id="aiBotSelect" class="inp inp-sm" onchange="switchAiBot()"></select>
      <button class="btn-sm" onclick="loadAiConfig()">刷新配置</button>
      <button class="btn-sm" onclick="testAiConnection()">测试连接</button>
      <button class="btn-sm" onclick="clearAiHistory()">清空历史</button>
    </div>
    <div class="ai-body">
      <!-- 左侧: 对话日志 -->
      <div class="ai-log-section">
        <div class="ai-log" id="aiLog">
          <span class="empty">选择运行中的 bot 查看 AI 活动</span>
        </div>
      </div>
      <!-- 右侧: 配置 -->
      <div class="ai-config-section">
        <label>System Prompt
          <textarea id="aiSystemPrompt" class="ai-textarea" rows="4" placeholder="输入 system prompt..."></textarea>
        </label>

        <label style="margin-top:10px">Few-Shot 示例
          <span style="font-size:11px;color:var(--text-muted)">（对话范例，帮助 AI 学习回复风格）</span>
        </label>
        <div id="aiFewshots" style="max-height:200px;overflow-y:auto;margin-top:4px"></div>
        <button class="btn-sm" onclick="addFewshot()" style="margin-top:4px">+ 添加示例</button>

        <label style="margin-top:8px">上下文轮数
          <input type="number" id="aiMaxHistory" class="inp inp-sm" value="10" min="1" max="50" style="width:80px">
        </label>
        <div style="margin-top:8px">
          <button class="btn-primary btn-sm" onclick="saveAiConfig()">保存配置</button>
          <span id="aiSaveMsg" style="font-size:12px;margin-left:8px;color:var(--green)"></span>
        </div>
        <div class="ai-stats" id="aiStats" style="margin-top:14px;font-size:12px;color:var(--text-muted)"></div>
      </div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
